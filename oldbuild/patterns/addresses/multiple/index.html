      <link rel="apple-touch-icon" href="/assets/rebrand/images/govuk-icon-180.png">

  <meta name="robots" content="noindex, nofollow">
  <meta name="og:title" content="Multiple text inputs – Addresses">
  <meta name="description" content="">
  <meta name="og:description" content="">

  <link href="/stylesheets/govuk-frontend-29487252a98c73d40fcf1c4a638d1d2d.min.css" rel="stylesheet" media="all">
  <link href="/stylesheets/example-28cf8f56ce3cba62d258b5725b59ecd7.css" rel="stylesheet" media="all">

  <body class="govuk-template__body app-example-page">
    <script>document.body.className += ' js-enabled' + ('noModule' in HTMLScriptElement.prototype ? ' govuk-frontend-supported' : '');</script>



  <!-- Disable browser validation for any examples that include form elements -->
  <form action="/form-handler" method="post" novalidate>
      

<fieldset class="govuk-fieldset">
  <legend class="govuk-fieldset__legend govuk-fieldset__legend--l">
    <h1 class="govuk-fieldset__heading">
      What is your address?
    </h1>
  </legend>

  <div class="govuk-form-group">
  <label class="govuk-label" for="address-line-1">
    Address line 1
  </label>
  <input class="govuk-input" id="address-line-1" name="addressLine1" type="text" autocomplete="address-line1">
</div>


  <div class="govuk-form-group">
  <label class="govuk-label" for="address-line-2">
    Address line 2 (optional)
  </label>
  <input class="govuk-input" id="address-line-2" name="addressLine2" type="text" autocomplete="address-line2">
</div>


  <div class="govuk-form-group">
  <label class="govuk-label" for="address-town">
    Town or city
  </label>
  <input class="govuk-input govuk-!-width-two-thirds" id="address-town" name="addressTown" type="text" autocomplete="address-level2">
</div>


  <div class="govuk-form-group">
  <label class="govuk-label" for="address-county">
    County (optional)
  </label>
  <input class="govuk-input govuk-!-width-two-thirds" id="address-county" name="addressCounty" type="text">
</div>


  <div class="govuk-form-group">
  <label class="govuk-label" for="address-postcode">
    Postcode
  </label>
  <input class="govuk-input govuk-input--width-10" id="address-postcode" name="addressPostcode" type="text" autocomplete="postal-code">
</div>



</fieldset>

  </form>


  <script type="module" src="/javascripts/application-example-df1b1846e6ebb2eca45a9e21924dfbd8.js"></script>
  </body>
</html>
